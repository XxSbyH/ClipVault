name: Build and Release

on:
  push:
    branches:
      - main
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  windows:
    name: Windows x64
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9
          run_install: false

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Setup Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy
          targets: x86_64-pc-windows-msvc

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Typecheck renderer
        run: pnpm typecheck

      - name: Test renderer
        run: pnpm test

      - name: Check Rust format
        run: cargo fmt --manifest-path src-tauri/Cargo.toml --check

      - name: Test Rust
        run: cargo test --manifest-path src-tauri/Cargo.toml

      - name: Lint Rust
        run: cargo clippy --manifest-path src-tauri/Cargo.toml -- -D warnings

      - name: Build Windows artifact
        run: pnpm tauri build --bundles nsis

      - name: Stage Windows release assets
        shell: pwsh
        run: |
          $ErrorActionPreference = 'Stop'
          New-Item -ItemType Directory -Force release-assets | Out-Null

          $appExe = 'src-tauri/target/release/clipvault.exe'
          if (!(Test-Path $appExe)) {
            throw "Missing Windows executable: $appExe"
          }

          $installer = Get-ChildItem -LiteralPath 'src-tauri/target/release/bundle/nsis' -Filter '*.exe' | Select-Object -First 1
          if ($null -eq $installer) {
            throw 'Missing Windows NSIS installer'
          }

          Copy-Item -LiteralPath $appExe -Destination 'release-assets/clipvault.exe'
          Copy-Item -LiteralPath $installer.FullName -Destination "release-assets/$($installer.Name)"
          Get-ChildItem -LiteralPath release-assets | Format-Table Name,Length

      - name: Upload workflow artifact
        uses: actions/upload-artifact@v4
        with:
          name: ClipVault-windows-x64
          path: release-assets/*
          if-no-files-found: error

  macos:
    name: macOS Universal
    runs-on: macos-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9
          run_install: false

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Setup Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-apple-darwin,aarch64-apple-darwin

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build macOS artifact
        run: pnpm tauri build --target universal-apple-darwin --bundles app,dmg --no-sign

      - name: Archive macOS app bundle
        run: |
          VERSION=$(node -p "require('./package.json').version")
          ditto -c -k --sequesterRsrc --keepParent \
            src-tauri/target/universal-apple-darwin/release/bundle/macos/ClipVault.app \
            "src-tauri/target/universal-apple-darwin/release/bundle/macos/ClipVault_${VERSION}_universal.app.zip"

      - name: Stage macOS release assets
        run: |
          set -euo pipefail
          mkdir -p release-assets
          shopt -s nullglob

          dmg_files=(src-tauri/target/universal-apple-darwin/release/bundle/dmg/*.dmg)
          app_zip_files=(src-tauri/target/universal-apple-darwin/release/bundle/macos/*.app.zip)

          if [ "${#dmg_files[@]}" -eq 0 ]; then
            echo "::error::Missing macOS DMG"
            exit 1
          fi

          if [ "${#app_zip_files[@]}" -eq 0 ]; then
            echo "::error::Missing macOS app zip"
            exit 1
          fi

          cp "${dmg_files[0]}" release-assets/
          cp "${app_zip_files[0]}" release-assets/
          ls -lah release-assets

      - name: Upload workflow artifact
        uses: actions/upload-artifact@v4
        with:
          name: ClipVault-macos-universal
          path: release-assets/*
          if-no-files-found: error

  publish-release:
    name: Publish GitHub Release
    runs-on: ubuntu-latest
    needs:
      - windows
      - macos
    if: ${{ startsWith(github.ref, 'refs/tags/v') }}

    steps:
      - name: Download release artifacts
        uses: actions/download-artifact@v4
        with:
          path: downloaded-release-assets
          merge-multiple: true

      - name: Stage GitHub Release assets
        run: |
          set -euo pipefail
          mkdir -p release-assets

          while IFS= read -r file; do
            cp "$file" "release-assets/$(basename "$file")"
          done < <(find downloaded-release-assets -type f)

          echo 'Release assets:'
          ls -lah release-assets

          required_patterns=(
            'clipvault.exe'
            'ClipVault_*_x64-setup.exe'
            '*.dmg'
            '*.app.zip'
          )

          for pattern in "${required_patterns[@]}"; do
            if ! compgen -G "release-assets/$pattern" > /dev/null; then
              echo "::error::Missing release asset: $pattern"
              exit 1
            fi
          done

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tag_name: ${{ github.ref_name }}
          name: ClipVault ${{ github.ref_name }}
          body: |
            更新内容：
            - 将最大历史条目数默认值调整为 10000。
            - 修复修改最大历史条目数时可能清空已有历史记录的问题。
            - 修复最大历史条目数输入 1000000 后失焦回退为 10000 的问题。
            - 支持将 Ctrl+X 剪切后的剪贴板内容写入历史记录。
          draft: false
          prerelease: ${{ contains(github.ref_name, '-') }}
          generate_release_notes: true
          overwrite_files: true
          files: release-assets/*
          fail_on_unmatched_files: true
