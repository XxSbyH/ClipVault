name: Build and Release

on:
  push:
    branches:
      - main
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      release_tag:
        description: 'Release tag to publish, for example v2.1.8'
        required: true
        type: string

permissions:
  contents: write

jobs:
  windows:
    name: Windows x64
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9
          run_install: false

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Setup Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy
          targets: x86_64-pc-windows-msvc

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Validate release metadata
        if: ${{ startsWith(github.ref, 'refs/tags/v') || github.event_name == 'workflow_dispatch' }}
        shell: pwsh
        env:
          RELEASE_TAG: ${{ github.event_name == 'workflow_dispatch' && inputs.release_tag || github.ref_name }}
        run: |
          $ErrorActionPreference = 'Stop'
          $version = (Get-Content -Raw -LiteralPath 'package.json' | ConvertFrom-Json).version
          $expectedTag = "v$version"
          if ($env:RELEASE_TAG -ne $expectedTag) {
            throw "Release tag $env:RELEASE_TAG does not match package version $expectedTag"
          }

          $releaseNotes = "docs/releases/$env:RELEASE_TAG.md"
          if (!(Test-Path $releaseNotes)) {
            throw "Missing release notes: $releaseNotes"
          }

      - name: Typecheck renderer
        run: pnpm typecheck

      - name: Test renderer
        run: pnpm test

      - name: Check Rust format
        run: cargo fmt --manifest-path src-tauri/Cargo.toml --check

      - name: Test Rust
        run: cargo test --manifest-path src-tauri/Cargo.toml

      - name: Lint Rust
        run: cargo clippy --manifest-path src-tauri/Cargo.toml -- -D warnings

      - name: Validate updater signing secrets
        shell: pwsh
        env:
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        run: |
          $ErrorActionPreference = 'Stop'
          if ([string]::IsNullOrWhiteSpace($env:TAURI_SIGNING_PRIVATE_KEY)) {
            throw 'Missing repository secret: TAURI_SIGNING_PRIVATE_KEY'
          }
          if ([string]::IsNullOrWhiteSpace($env:TAURI_SIGNING_PRIVATE_KEY_PASSWORD)) {
            throw 'Missing repository secret: TAURI_SIGNING_PRIVATE_KEY_PASSWORD'
          }

      - name: Build Windows artifact
        env:
          CARGO_BUILD_JOBS: 1
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        run: pnpm tauri build --bundles nsis

      - name: Stage Windows release assets
        shell: pwsh
        run: |
          $ErrorActionPreference = 'Stop'
          New-Item -ItemType Directory -Force release-assets | Out-Null

          $appExe = 'src-tauri/target/release/clipvault.exe'
          if (!(Test-Path $appExe)) {
            throw "Missing Windows executable: $appExe"
          }

          $version = (Get-Content -Raw -LiteralPath 'package.json' | ConvertFrom-Json).version
          $installer = Get-ChildItem -LiteralPath 'src-tauri/target/release/bundle/nsis' -Filter "ClipVault_${version}_x64-setup.exe" | Select-Object -First 1
          if ($null -eq $installer) {
            throw "Missing Windows NSIS installer for version $version"
          }

          $signatureFile = "$($installer.FullName).sig"
          if (!(Test-Path $signatureFile)) {
            throw "Missing Windows updater signature: $signatureFile"
          }

          $releaseInstallerName = "ClipVault_${version}_windows_x64_setup.exe"
          $signature = (Get-Content -Raw -LiteralPath $signatureFile).Trim()
          $downloadUrl = "https://github.com/${{ github.repository }}/releases/latest/download/$releaseInstallerName"
          $latest = [ordered]@{
            version = $version
            notes = '新增最近历史快捷键、托盘左键打开/右键菜单、启动后自动检查更新。'
            pub_date = [DateTimeOffset]::UtcNow.ToString('yyyy-MM-ddTHH:mm:ssZ')
            platforms = [ordered]@{
              'windows-x86_64' = [ordered]@{
                signature = $signature
                url = $downloadUrl
              }
            }
          }

          Copy-Item -LiteralPath $appExe -Destination "release-assets/ClipVault_${version}_windows_x64_portable.exe"
          Copy-Item -LiteralPath $installer.FullName -Destination "release-assets/$releaseInstallerName"
          Copy-Item -LiteralPath $signatureFile -Destination "release-assets/$releaseInstallerName.sig"
          $latest | ConvertTo-Json -Depth 5 | Set-Content -Encoding utf8 -LiteralPath 'release-assets/latest.json'
          Get-ChildItem -LiteralPath release-assets | Format-Table Name,Length

      - name: Upload workflow artifact
        uses: actions/upload-artifact@v4
        with:
          name: ClipVault-windows-x64
          path: release-assets/*
          if-no-files-found: error

  macos:
    name: macOS Universal
    runs-on: macos-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9
          run_install: false

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Setup Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-apple-darwin,aarch64-apple-darwin

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Validate release metadata
        if: ${{ startsWith(github.ref, 'refs/tags/v') || github.event_name == 'workflow_dispatch' }}
        env:
          RELEASE_TAG: ${{ github.event_name == 'workflow_dispatch' && inputs.release_tag || github.ref_name }}
        run: |
          set -euo pipefail
          VERSION=$(node -p "require('./package.json').version")
          EXPECTED_TAG="v${VERSION}"
          if [ "$RELEASE_TAG" != "$EXPECTED_TAG" ]; then
            echo "::error::Release tag $RELEASE_TAG does not match package version $EXPECTED_TAG"
            exit 1
          fi

          RELEASE_NOTES="docs/releases/${RELEASE_TAG}.md"
          if [ ! -f "$RELEASE_NOTES" ]; then
            echo "::error::Missing release notes: $RELEASE_NOTES"
            exit 1
          fi

      - name: Build macOS artifact
        env:
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        run: pnpm tauri build --target universal-apple-darwin --bundles app,dmg --no-sign

      - name: Archive macOS app bundle
        run: |
          VERSION=$(node -p "require('./package.json').version")
          ditto -c -k --sequesterRsrc --keepParent \
            src-tauri/target/universal-apple-darwin/release/bundle/macos/ClipVault.app \
            "src-tauri/target/universal-apple-darwin/release/bundle/macos/ClipVault_${VERSION}_universal.app.zip"

      - name: Stage macOS release assets
        run: |
          set -euo pipefail
          mkdir -p release-assets
          shopt -s nullglob

          VERSION=$(node -p "require('./package.json').version")

          dmg_files=(src-tauri/target/universal-apple-darwin/release/bundle/dmg/*.dmg)
          app_zip_files=(src-tauri/target/universal-apple-darwin/release/bundle/macos/*.app.zip)

          if [ "${#dmg_files[@]}" -eq 0 ]; then
            echo "::error::Missing macOS DMG"
            exit 1
          fi

          if [ "${#app_zip_files[@]}" -eq 0 ]; then
            echo "::error::Missing macOS app zip"
            exit 1
          fi

          cp "${dmg_files[0]}" "release-assets/ClipVault_${VERSION}_macos_universal.dmg"
          cp "${app_zip_files[0]}" "release-assets/ClipVault_${VERSION}_macos_universal.app.zip"
          ls -lah release-assets

      - name: Upload workflow artifact
        uses: actions/upload-artifact@v4
        with:
          name: ClipVault-macos-universal
          path: release-assets/*
          if-no-files-found: error

  publish-release:
    name: Publish GitHub Release
    runs-on: ubuntu-latest
    needs:
      - windows
      - macos
    if: ${{ startsWith(github.ref, 'refs/tags/v') || github.event_name == 'workflow_dispatch' }}
    env:
      RELEASE_TAG: ${{ github.event_name == 'workflow_dispatch' && inputs.release_tag || github.ref_name }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download release artifacts
        uses: actions/download-artifact@v4
        with:
          path: downloaded-release-assets
          merge-multiple: true

      - name: Stage GitHub Release assets
        run: |
          set -euo pipefail
          mkdir -p release-assets

          while IFS= read -r file; do
            cp "$file" "release-assets/$(basename "$file")"
          done < <(find downloaded-release-assets -type f)

          echo 'Release assets:'
          ls -lah release-assets

          required_patterns=(
            'ClipVault_*_windows_x64_portable.exe'
            'ClipVault_*_windows_x64_setup.exe'
            'ClipVault_*_windows_x64_setup.exe.sig'
            'latest.json'
            'ClipVault_*_macos_universal.dmg'
            'ClipVault_*_macos_universal.app.zip'
          )

          for pattern in "${required_patterns[@]}"; do
            if ! compgen -G "release-assets/$pattern" > /dev/null; then
              echo "::error::Missing release asset: $pattern"
              exit 1
            fi
          done

          release_notes="docs/releases/${RELEASE_TAG}.md"
          if [ ! -f "$release_notes" ]; then
            echo "::error::Missing release notes: $release_notes"
            exit 1
          fi

          version=$(node -p "require('./package.json').version")
          expected_tag="v${version}"
          if [ "$RELEASE_TAG" != "$expected_tag" ]; then
            echo "::error::Release tag $RELEASE_TAG does not match package version $expected_tag"
            exit 1
          fi

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tag_name: ${{ env.RELEASE_TAG }}
          name: ClipVault ${{ env.RELEASE_TAG }}
          body_path: docs/releases/${{ env.RELEASE_TAG }}.md
          draft: false
          prerelease: ${{ contains(env.RELEASE_TAG, '-') }}
          generate_release_notes: false
          overwrite_files: true
          files: release-assets/*
          fail_on_unmatched_files: true
