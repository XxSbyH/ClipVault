name: Build and Release

on:
  push:
    branches:
      - main
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  windows:
    name: Windows x64
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9
          run_install: false

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Setup Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy
          targets: x86_64-pc-windows-msvc

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Typecheck renderer
        run: pnpm typecheck

      - name: Test renderer
        run: pnpm test

      - name: Check Rust format
        run: cargo fmt --manifest-path src-tauri/Cargo.toml --check

      - name: Test Rust
        run: cargo test --manifest-path src-tauri/Cargo.toml

      - name: Lint Rust
        run: cargo clippy --manifest-path src-tauri/Cargo.toml -- -D warnings

      - name: Build Windows artifact
        run: pnpm tauri build --bundles nsis

      - name: Upload workflow artifact
        uses: actions/upload-artifact@v4
        with:
          name: ClipVault-windows-x64
          path: |
            src-tauri/target/release/clipvault.exe
            src-tauri/target/release/bundle/nsis/*.exe
          if-no-files-found: error

  macos:
    name: macOS Universal
    runs-on: macos-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9
          run_install: false

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Setup Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-apple-darwin,aarch64-apple-darwin

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build macOS artifact
        run: pnpm tauri build --target universal-apple-darwin --bundles app,dmg --no-sign

      - name: Archive macOS app bundle
        run: |
          VERSION=$(node -p "require('./package.json').version")
          ditto -c -k --sequesterRsrc --keepParent \
            src-tauri/target/universal-apple-darwin/release/bundle/macos/ClipVault.app \
            "src-tauri/target/universal-apple-darwin/release/bundle/macos/ClipVault_${VERSION}_universal.app.zip"

      - name: Upload workflow artifact
        uses: actions/upload-artifact@v4
        with:
          name: ClipVault-macos-universal
          path: |
            src-tauri/target/universal-apple-darwin/release/bundle/dmg/*.dmg
            src-tauri/target/universal-apple-darwin/release/bundle/macos/*.app.zip
          if-no-files-found: error

  publish-release:
    name: Publish GitHub Release
    runs-on: ubuntu-latest
    needs:
      - windows
      - macos
    if: ${{ startsWith(github.ref, 'refs/tags/v') }}

    steps:
      - name: Download release artifacts
        uses: actions/download-artifact@v4
        with:
          path: release-assets
          merge-multiple: true

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tag_name: ${{ github.ref_name }}
          name: ClipVault ${{ github.ref_name }}
          body: |
            更新内容：
            - 详情面板文本内容改为展示完整剪贴板文本，并保留滚动查看。
            - 修复快捷键浏览历史时，复制项被刷新到最新位置后游标顺序跳回的问题。
            - Release 资产新增 macOS universal `.dmg` 和 `.app.zip`，当前 macOS 包未进行 Apple 签名/公证。
          draft: false
          prerelease: ${{ contains(github.ref_name, '-') }}
          generate_release_notes: true
          files: release-assets/*
          fail_on_unmatched_files: true
