[[permission]]
identifier = "allow-task4-commands"
description = "Allows ClipVault Task 4 application commands exposed to the renderer."
commands.allow = [
  "health_check",
  "get_history",
  "get_history_revision",
  "search_items",
  "set_quick_paste_cursor",
  "paste_item",
  "copy_item",
  "special_paste_item",
  "update_text_item",
  "create_text_item",
  "delete_item",
  "toggle_pin",
  "toggle_favorite",
  "get_image_data_url",
  "get_settings",
  "update_setting",
  "list_blacklist",
  "add_blacklist",
  "remove_blacklist",
  "list_fixed_contents",
  "create_fixed_content",
  "update_fixed_content",
  "delete_fixed_content",
  "get_hotkeys",
  "check_hotkey_conflicts",
  "check_hotkey_available",
  "update_hotkeys",
  "clear_history",
  "export_history",
  "import_history",
  "toggle_monitoring",
  "minimize_window",
  "hide_window",
  "hide_search_window",
  "test_monitoring",
  "test_hud",
]
