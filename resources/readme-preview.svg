    <rect x="28" y="22" width="1044" height="58" rx="29" fill="#f8fbfa"/>
    <rect x="54" y="35" width="140" height="32" rx="16" fill="#ffffff" stroke="#d7e7e3"/>
    <text x="89" y="56" fill="#334155" font-family="Segoe UI, Microsoft YaHei UI, sans-serif" font-size="13" font-weight="900">ClipVault</text>
