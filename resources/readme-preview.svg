      <text x="64" y="48" fill="#0f766e" font-family="Segoe UI, Microsoft YaHei UI, sans-serif" font-size="14" font-weight="900">监听中</text>
      <text x="164" y="48" fill="#64748b" font-family="Segoe UI, Microsoft YaHei UI, sans-serif" font-size="14" font-weight="800">历史 16</text>
      <text x="232" y="48" fill="#64748b" font-family="Segoe UI, Microsoft YaHei UI, sans-serif" font-size="14" font-weight="800">收藏 0</text>

      <rect x="28" y="82" width="500" height="48" rx="18" fill="#ffffff" stroke="#d7e7e3"/>
      <circle cx="55" cy="106" r="8" fill="none" stroke="#8aa6a1" stroke-width="3"/>
      <path d="M61 112l8 8" stroke="#8aa6a1" stroke-width="3" stroke-linecap="round"/>
      <text x="84" y="112" fill="#9aacaa" font-family="Segoe UI, Microsoft YaHei UI, sans-serif" font-size="17" font-weight="800">输入要搜索的内容</text>
      <text x="364" y="112" fill="#0f766e" font-family="Segoe UI, Microsoft YaHei UI, sans-serif" font-size="14" font-weight="900">/token|key/i</text>

      <g transform="translate(552 82)">
        <rect x="0" y="0" width="92" height="48" rx="18" fill="#0f8f83"/>
        <text x="32" y="30" fill="#ffffff" font-family="Segoe UI, Microsoft YaHei UI, sans-serif" font-size="14" font-weight="900">全部</text>
        <rect x="108" y="0" width="92" height="48" rx="18" fill="#f8fbfa"/>
        <text x="138" y="30" fill="#58736f" font-family="Segoe UI, Microsoft YaHei UI, sans-serif" font-size="14" font-weight="900">文本</text>
        <rect x="216" y="0" width="92" height="48" rx="18" fill="#f8fbfa"/>
        <text x="246" y="30" fill="#58736f" font-family="Segoe UI, Microsoft YaHei UI, sans-serif" font-size="14" font-weight="900">图片</text>
      </g>

      <g transform="translate(28 152)">
        <rect x="0" y="0" width="602" height="142" rx="24" fill="#f8fbfa" stroke="#d7e7e3"/>
        <rect x="18" y="16" width="560" height="46" rx="17" fill="#ffffff" stroke="#d7e7e3"/>
        <rect x="36" y="27" width="26" height="26" rx="9" fill="#fff3df"/>
        <text x="86" y="46" fill="#0f172a" font-family="Segoe UI, Microsoft YaHei UI, sans-serif" font-size="17" font-weight="900">项目路径</text>

        <rect x="18" y="78" width="560" height="48" rx="17" fill="#edfffb" stroke="#21d6c5" stroke-width="2"/>
        <rect x="36" y="89" width="28" height="28" rx="9" fill="#e8f7ff"/>
        <path d="M43 110l8-9 7 7 6-8 10 10z" fill="#0ea5e9"/>
        <text x="86" y="108" fill="#0f172a" font-family="Segoe UI, Microsoft YaHei UI, sans-serif" font-size="17" font-weight="900">screenshot_product_ui.png</text>
      </g>

      <g transform="translate(660 152)">
        <rect x="0" y="0" width="304" height="142" rx="24" fill="#ffffff" stroke="#d7e7e3"/>
        <text x="28" y="31" fill="#8aa6a1" font-family="Segoe UI, Microsoft YaHei UI, sans-serif" font-size="13" font-weight="900">当前选择</text>
        <text x="28" y="58" fill="#0f172a" font-family="Segoe UI, Microsoft YaHei UI, sans-serif" font-size="22" font-weight="900">图片预览</text>
        <rect x="166" y="28" width="108" height="74" rx="16" fill="url(#photo)"/>
        <path d="M178 91l28-25 21 17 14-13 29 21z" fill="#ffffff" opacity="0.72"/>
        <rect x="28" y="94" width="112" height="30" rx="15" fill="#0f8f83"/>
        <text x="70" y="115" fill="#ffffff" font-family="Segoe UI, Microsoft YaHei UI, sans-serif" font-size="14" font-weight="900">复制</text>
      </g>
