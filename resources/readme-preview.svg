  <g transform="translate(92 664)">
    <rect x="0" y="0" width="150" height="34" rx="17" fill="#e9fffa" stroke="#bff2ea"/>
    <text x="44" y="23" fill="#0f766e" font-family="Segoe UI, Microsoft YaHei UI, sans-serif" font-size="14" font-weight="900">正则搜索</text>
    <rect x="170" y="0" width="150" height="34" rx="17" fill="#fff3df" stroke="#ffe0b8"/>
    <text x="214" y="23" fill="#bd5b0b" font-family="Segoe UI, Microsoft YaHei UI, sans-serif" font-size="14" font-weight="900">图片预览</text>
    <rect x="340" y="0" width="150" height="34" rx="17" fill="#e9fffa" stroke="#bff2ea"/>
    <text x="384" y="23" fill="#0f766e" font-family="Segoe UI, Microsoft YaHei UI, sans-serif" font-size="14" font-weight="900">本地存储</text>
