<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="720" viewBox="0 0 1280 720" role="img" aria-label="ClipVault 主界面宣传预览">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1280" y2="720" gradientUnits="userSpaceOnUse">
      <stop stop-color="#f7fbf8"/>
      <stop offset="1" stop-color="#eefaf6"/>
    </linearGradient>
    <linearGradient id="panel" x1="90" y1="184" x2="1190" y2="650" gradientUnits="userSpaceOnUse">
      <stop stop-color="#ffffff"/>
      <stop offset="1" stop-color="#f8fffc"/>
    </linearGradient>
    <linearGradient id="photo" x1="880" y1="448" x2="1098" y2="570" gradientUnits="userSpaceOnUse">
      <stop stop-color="#18a7d8"/>
      <stop offset="0.5" stop-color="#20c7b4"/>
      <stop offset="1" stop-color="#f97316"/>
    </linearGradient>
    <filter id="soft-shadow" x="-8%" y="-8%" width="116%" height="126%">
      <feDropShadow dx="0" dy="26" stdDeviation="24" flood-color="#0a3f3b" flood-opacity="0.16"/>
    </filter>
    <pattern id="grid" width="28" height="28" patternUnits="userSpaceOnUse">
      <path d="M28 0H0v28" fill="none" stroke="#cfe6e1" stroke-opacity="0.42"/>
    </pattern>
  </defs>

  <rect width="1280" height="720" fill="url(#bg)"/>
  <rect width="1280" height="720" fill="url(#grid)"/>
  <circle cx="1124" cy="102" r="156" fill="#d8fff7" opacity="0.72"/>
  <circle cx="128" cy="666" r="205" fill="#f97316" opacity="0.08"/>

  <g transform="translate(92 54)">
    <text x="0" y="0" fill="#0f766e" font-family="Segoe UI, Microsoft YaHei UI, sans-serif" font-size="17" font-weight="900" letter-spacing="5">CLIPVAULT</text>
    <text x="0" y="48" fill="#0f172a" font-family="Segoe UI, Microsoft YaHei UI, sans-serif" font-size="40" font-weight="900">剪贴板工作台</text>
    <text x="0" y="84" fill="#58736f" font-family="Segoe UI, Microsoft YaHei UI, sans-serif" font-size="20" font-weight="700">搜索、分类、预览和再次复制，一屏完成。</text>
  </g>

  <g transform="translate(840 62)">
    <rect x="0" y="0" width="124" height="36" rx="18" fill="#e9fffa" stroke="#bff2ea"/>
    <text x="31" y="24" fill="#0f766e" font-family="Segoe UI, Microsoft YaHei UI, sans-serif" font-size="14" font-weight="900">Tauri 2</text>
    <rect x="140" y="0" width="136" height="36" rx="18" fill="#fff3df" stroke="#ffe0b8"/>
    <text x="174" y="24" fill="#bd5b0b" font-family="Segoe UI, Microsoft YaHei UI, sans-serif" font-size="14" font-weight="900">小体积</text>
    <rect x="292" y="0" width="136" height="36" rx="18" fill="#e9fffa" stroke="#bff2ea"/>
    <text x="326" y="24" fill="#0f766e" font-family="Segoe UI, Microsoft YaHei UI, sans-serif" font-size="14" font-weight="900">本地优先</text>
  </g>

