<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="520" viewBox="0 0 1280 520" role="img" aria-label="ClipVault HUD 宣传预览">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1280" y2="520" gradientUnits="userSpaceOnUse">
      <stop stop-color="#f7fbf8"/>
      <stop offset="1" stop-color="#eefaf6"/>
    </linearGradient>
    <filter id="shadow" x="-8%" y="-18%" width="116%" height="150%">
      <feDropShadow dx="0" dy="22" stdDeviation="22" flood-color="#0a3f3b" flood-opacity="0.16"/>
    </filter>
    <pattern id="grid" width="28" height="28" patternUnits="userSpaceOnUse">
      <path d="M28 0H0v28" fill="none" stroke="#cfe6e1" stroke-opacity="0.42"/>
    </pattern>
  </defs>

  <rect width="1280" height="520" fill="url(#bg)"/>
  <rect width="1280" height="520" fill="url(#grid)"/>
  <circle cx="1118" cy="84" r="146" fill="#d8fff7" opacity="0.72"/>
  <circle cx="122" cy="486" r="176" fill="#f97316" opacity="0.08"/>

  <g transform="translate(92 58)">
    <text x="0" y="0" fill="#0f766e" font-family="Segoe UI, Microsoft YaHei UI, sans-serif" font-size="17" font-weight="900" letter-spacing="5">CLIPVAULT HUD</text>
    <text x="0" y="48" fill="#0f172a" font-family="Segoe UI, Microsoft YaHei UI, sans-serif" font-size="40" font-weight="900">轻量反馈，不打断当前工作</text>
    <text x="0" y="84" fill="#58736f" font-family="Segoe UI, Microsoft YaHei UI, sans-serif" font-size="20" font-weight="700">快捷切换、复制成功、面板状态，统一通过屏幕顶部 HUD 提示。</text>
  </g>

  <g transform="translate(258 176)" filter="url(#shadow)">
    <rect x="0" y="0" width="764" height="78" rx="39" fill="#f7fffc" stroke="#d7e7e3"/>
    <rect x="18" y="14" width="96" height="50" rx="25" fill="#0f8f83"/>
    <text x="45" y="46" fill="#ffffff" font-family="Segoe UI, Microsoft YaHei UI, sans-serif" font-size="17" font-weight="900">上一项</text>
    <rect x="130" y="14" width="88" height="50" rx="25" fill="#fff3df"/>
    <text x="158" y="46" fill="#bd5b0b" font-family="Segoe UI, Microsoft YaHei UI, sans-serif" font-size="17" font-weight="900">文本</text>
    <text x="244" y="47" fill="#0f172a" font-family="Segoe UI, Microsoft YaHei UI, sans-serif" font-size="22" font-weight="900">代码片段已复制到剪贴板</text>
    <text x="640" y="47" fill="#58736f" font-family="Segoe UI, Microsoft YaHei UI, sans-serif" font-size="16" font-weight="900">Ctrl+Alt</text>
  </g>

  <g transform="translate(118 328)">
    <rect x="0" y="0" width="324" height="118" rx="28" fill="#ffffff" stroke="#d7e7e3"/>
    <rect x="28" y="28" width="56" height="56" rx="18" fill="#e9fffa"/>
    <path d="M45 58h22M56 47v22" stroke="#0f8f83" stroke-width="5" stroke-linecap="round"/>
    <text x="108" y="48" fill="#0f172a" font-family="Segoe UI, Microsoft YaHei UI, sans-serif" font-size="22" font-weight="900">快捷粘贴</text>
    <text x="108" y="78" fill="#58736f" font-family="Segoe UI, Microsoft YaHei UI, sans-serif" font-size="16" font-weight="700">不用打开完整面板</text>

    <rect x="366" y="0" width="324" height="118" rx="28" fill="#ffffff" stroke="#d7e7e3"/>
    <rect x="394" y="28" width="56" height="56" rx="18" fill="#fff3df"/>
    <path d="M409 57h25M424 45v25" stroke="#bd5b0b" stroke-width="5" stroke-linecap="round"/>
    <text x="474" y="48" fill="#0f172a" font-family="Segoe UI, Microsoft YaHei UI, sans-serif" font-size="22" font-weight="900">面板状态</text>
    <text x="474" y="78" fill="#58736f" font-family="Segoe UI, Microsoft YaHei UI, sans-serif" font-size="16" font-weight="700">唤起、隐藏、暂停监听</text>

    <rect x="732" y="0" width="324" height="118" rx="28" fill="#ffffff" stroke="#d7e7e3"/>
    <rect x="760" y="28" width="56" height="56" rx="18" fill="#e9fffa"/>
    <path d="M776 58l10 10 18-24" fill="none" stroke="#0f8f83" stroke-width="5" stroke-linecap="round" stroke-linejoin="round"/>
    <text x="840" y="48" fill="#0f172a" font-family="Segoe UI, Microsoft YaHei UI, sans-serif" font-size="22" font-weight="900">复制结果</text>
    <text x="840" y="78" fill="#58736f" font-family="Segoe UI, Microsoft YaHei UI, sans-serif" font-size="16" font-weight="700">成功、失败、当前类型</text>
  </g>
</svg>
